spring:
  application:
    name: quiniela-backend
  
  datasource:
    url: jdbc:postgresql://postgres:5432/quiniela
    username: quiniela_user
    password: quiniela_pass
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080

jwt:
  secret: dGhpc2lzYXZlcnlsb25nc2VjcmV0a2V5Zm9yand0YXV0aGVudGljYXRpb25wdXJwb3Nlcw==

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  refresh-token-expiration-days: 30

email:
  from: ${EMAIL_FROM:Quiniela <onboarding@resend.dev>}

resend:
  api-key: ${RESEND_API_KEY:}

logging:
  level:
    com.quiniela: DEBUG
