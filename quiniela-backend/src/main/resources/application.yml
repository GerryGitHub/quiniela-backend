spring:
  application:
    name: quiniela-backend
  
  datasource:
    url: jdbc:postgresql://localhost:5433/quiniela
    username: quiniela_user
    password: quiniela_pass
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080

jwt:
  secret: dGhpc2lzYXZlcnlsb25nc2VjcmV0a2V5Zm9yand0YXV0aGVudGljYXRpb25wdXJwb3Nlcw==

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.quiniela: DEBUG

# APIs de resultados de fútbol (dejar en blanco si no se usa)
api:
  football:
    key: ${API_FOOTBALL_KEY:}
    host: ${API_FOOTBALL_HOST:api-football-v1.p.rapidapi.com}

football-data:
  key: ${FOOTBALL_DATA_KEY:}

thesportsdb:
  key: ${THESPORTSDB_KEY:}
