services:
  postgres:
    image: postgres:16-alpine
    container_name: quiniela-db
    environment:
      POSTGRES_DB: quiniela
      POSTGRES_USER: quiniela_user
      POSTGRES_PASSWORD: quiniela_pass
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quiniela_user -d quiniela"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quiniela-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/quiniela
      SPRING_DATASOURCE_USERNAME: quiniela_user
      SPRING_DATASOURCE_PASSWORD: quiniela_pass
      RESEND_API_KEY: ${RESEND_API_KEY}
      APP_BASE_URL: https://api.gjapps.com
      EMAIL_FROM: ${EMAIL_FROM}
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: